<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>페이지를 찾을 수 없습니다 | 팁스 영어·수학학원</title>
    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f8fafc;
        color: #0f172a;
        font-family:
          "Noto Sans KR",
          "Apple SD Gothic Neo",
          "Malgun Gothic",
          sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 28px;
        background: #ffffff;
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.15;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #475569;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: #ffffff;
        color: #0f172a;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>페이지를 찾을 수 없습니다.</h1>
      <p>요청하신 주소가 바뀌었거나 존재하지 않습니다. 아래 공개 페이지로 바로 이동할 수 있습니다.</p>
      <nav aria-label="공개 페이지 바로가기">
        <a href="/">홈</a>
        <a href="/reviews">리뷰</a>
        <a href="/classes">수업</a>
        <a href="/results">성적</a>
      </nav>
    </main>
  </body>
</html>
