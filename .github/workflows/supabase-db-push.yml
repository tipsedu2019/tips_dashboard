name: Push Supabase Migrations

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: dqpccpblshdnqzbjvkxd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "Missing required secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --linked --include-all
