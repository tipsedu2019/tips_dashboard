name: Push Supabase Migrations

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Supabase migration layout
        run: node scripts/verify-supabase-migration-layout.mjs

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "Missing required secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi

      - name: Resolve Supabase project ref
        shell: bash
        run: |
          project_ref="$(sed -n 's/^project_id = "\(.*\)"$/\1/p' supabase/config.toml | head -n 1)"
          if [ -z "${project_ref}" ]; then
            echo "Missing project_id in supabase/config.toml"
            exit 1
          fi
          echo "SUPABASE_PROJECT_REF=${project_ref}" >> "${GITHUB_ENV}"
          echo "Using Supabase project ref from supabase/config.toml"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.107.0

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: supabase db push --linked --include-all
